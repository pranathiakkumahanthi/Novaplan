<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="signup.css">
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <title>Sign up</title>
</head>
<body>

<nav>
    <div class="nav-left">
        <img src="logo.jpg" alt="NovaPlan Logo" class="logo">
        <p class="heading">NovaPlan</p>
    </div>
    <div class="nav-right">
        <p class="grey">Already have an account?</p>
        <a href="login.html" class="green">Login</a>
    </div>
</nav>

<div class="card">
    <h1>New Account</h1>

    <div class="form-container">

        <label>Enter Your Username</label>
        <div class="input-box">
            <input type="text" id="username" placeholder="Username">
        </div>

        <label>Enter Email Address</label>
        <div class="input-box">
            <input type="email" id="email" placeholder="Email">
        </div>

        <label>Create a Password</label>
        <div class="input-box">
            <input type="password" id="password" placeholder="Password">
        </div>

        <label>Confirm Password</label>
        <div class="input-box">
            <input type="password" id="confirmPassword" placeholder="Confirm Password">
        </div>

        <button class="submit-btn" onclick="signup()">Create Account</button>

        <p class="or">or</p>

        <div id="g_id_onload"
            data-client_id="383311099064-d7hhsdpsi8kc9695s7r6ik87so7ok3k8.apps.googleusercontent.com"
            data-callback="handleGoogleLogin">
        </div>

        <div class="g_id_signin" data-type="standard"></div>

        <p id="message" class="message"></p>

    </div>
</div>

<script>
async function signup() {
    const message = document.getElementById("message");
    const username = document.getElementById("username").value;
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;
    const confirmPassword = document.getElementById("confirmPassword").value;

    message.innerText = "";
    message.className = "message";

    if (password !== confirmPassword) {
        message.innerText = "Passwords do not match";
        message.classList.add("error");
        return;
    }

    try {
        const response = await fetch("http://127.0.0.1:5000/signup", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ username, email, password })
        });

        const data = await response.json();

        if (data.status === "success") {
            message.innerText = "Account created successfully!";
            message.classList.add("success");
            setTimeout(() => { window.location.href = "login.html"; }, 1500);
        } else {
            message.innerText = data.message || "Signup failed";
            message.classList.add("error");
        }
    } catch (error) {
        console.error(error);
        message.innerText = "Server error. Try again later.";
        message.classList.add("error");
    }
}

function handleGoogleLogin(response) {
    fetch("http://127.0.0.1:5000/google-login", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ token: response.credential })
    })
    .then(res => res.json())
    .then(data => {
        if (data.status === "success") {
            localStorage.setItem("user_id", data.user_id);
            window.location.href = "home.html";
        } else {
            alert("Google login failed");
        }
    })
    .catch(err => {
        console.error(err);
        alert("Google login error");
    });
}
</script>
</body>
</html>
