<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NovaPlan - Me</title>
    <link rel="stylesheet" href="profile.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
</head>
<body class="light">

<!-- NAVBAR -->
<nav>
    <div class="left">
        <img src="logo.jpg" class="logo" alt="NovaPlan logo">
        <p class="heading">NovaPlan</p>
    </div>
    <div class="right">
        <button id="themeToggle" class="theme-toggle">🌙</button>
        <button id="menuBtn" class="menu">☰</button>
    </div>
</nav>

<!-- SIDE MENU -->
<div id="sideMenu" class="side-menu hidden">
    <a href="home.html">Tasks</a>
    <a href="notebooks.html">Notebooks</a>
    <a href="calendar.html">Calendar</a>
    <a href="profile.html">Me</a>
</div>

<div class="page">

    <!-- PROFILE SECTION -->
    <div class="profile-section">
        <div class="avatar" id="avatarCircle">?</div>
        <div class="profile-info">
            <p class="profile-name" id="profileName">User</p>
            <p class="profile-email" id="profileEmail">—</p>
        </div>
    </div>

    <!-- TASKS OVERVIEW -->
    <p class="section-label">Tasks Overview</p>
    <div class="stats-row">
        <div class="stat-card">
            <p class="stat-num" id="completedCount">—</p>
            <p class="stat-lbl">Completed tasks</p>
        </div>
        <div class="stat-card">
            <p class="stat-num" id="pendingCount">—</p>
            <p class="stat-lbl">Pending tasks</p>
        </div>
    </div>

    <!-- BAR GRAPH -->
    <div class="chart-card">
        <p class="chart-title">Completion of Daily Tasks</p>
        <canvas id="taskChart"></canvas>
    </div>

    <!-- LOGOUT -->
    <button id="logoutBtn" class="logout-btn">Log Out</button>

</div>

<script src="profile.js"></script>
</body>
</html>
