<!DOCTYPE html>
<html lang="en">
<head>
    <!-- FIX: added charset and viewport meta tags -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NovaPlan - Home</title>
    <link rel="stylesheet" href="home.css">
</head>

<body class="light">

<!-- NAVBAR -->
<nav>
    <div class="left">
        <!-- FIX: added alt attribute -->
        <img src="logo.jpg" class="logo" alt="NovaPlan logo">
        <p class="heading">NovaPlan</p>
    </div>
    <div class="right">
        <button id="themeToggle" class="theme-toggle">🌙</button>
        <button id="menuBtn" class="menu">☰</button>
    </div>
</nav>

<!-- SIDE MENU -->
<div id="sideMenu" class="side-menu hidden">
    <a href="home.html">Tasks</a>
    <a href="notebooks.html">Notebooks</a>
    <a href="calendar.html">Calendar</a>
    <a href="profile.html">Me</a>
</div>

<!-- CATEGORY BAR -->
<div class="categories-wrapper">
    <div class="categories" id="categoryBar">
        <button id="allBtn" class="active">All</button>
        <button id="addCategory">+</button>
    </div>
    <button id="menuDots">⋯</button>
    <div id="categoryMenu" class="category-menu hidden">
        <p id="deleteCat">Delete Categories</p>
        <p id="editCat">Rename Categories</p>
    </div>
</div>
<!-- TASK LIST -->
<div id="taskContainer"></div>

<!-- FLOATING ADD BUTTON -->
<button id="addTaskBtn">+</button>

<!-- OVERLAY -->
<div id="overlay" class="overlay hidden"></div>

<!-- BOTTOM SHEET -->
<div id="taskSheet" class="task-sheet hidden">
    <input type="text" id="taskInput" placeholder="Input new task here">
    <input type="date" id="taskDate">
    <div class="task-options">
        <select id="categorySelect">
            <option value="">Choose Category</option>
        </select>
        <button id="sendTask">➤</button>
    </div>
</div>

<!-- CATEGORY MENU -->
<div id="categoryMenu" class="category-menu hidden">
    <p id="deleteCat">Delete Categories</p>
    <p id="editCat">Rename Categories</p>
</div>

<!-- DELETE MODAL -->
<div id="deleteModal" class="modal hidden">
    <div class="modal-content">
        <h3>Delete Categories</h3>
        <div id="deleteList"></div>
        <button id="confirmDelete">Delete</button>
    </div>
</div>

<!-- RENAME MODAL -->
<div id="renameModal" class="modal hidden">
    <div class="modal-content">
        <h3>Rename Category</h3>
        <input type="text" id="oldCategory" placeholder="Current name">
        <input type="text" id="newCategory" placeholder="New name">
        <button id="confirmRename">Rename</button>
    </div>
</div>

<!-- ADD CATEGORY MODAL -->
<div id="addCategoryModal" class="modal hidden">
    <div class="modal-content">
        <h3>Add Category</h3>
        <input type="text" id="newCategoryInput" placeholder="Enter category name">
        <button id="confirmAddCategory">Add</button>
    </div>
</div>

<script src="home.js"></script>
</body>
</html>
